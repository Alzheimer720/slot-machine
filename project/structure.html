<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎰 Code Casino 🎰</h1>
        
        <div class="wallet-section">
            <h2>Balance: ₹<span id="balance-display">0</span></h2>
            <div class="input-group">
                <input type="number" id="deposit-input" placeholder="Deposit Amount">
                <button id="deposit-btn">Deposit</button>
            </div>
            <p id="deposit-msg" class="error-text"></p>
        </div>

        <div class="game-section">
            <div class="controls">
                <div class="input-group">
                    <label for="lines-input">Lines (1-3):</label>
                    <input type="number" id="lines-input" min="1" max="3" value="1">
                </div>
                <div class="input-group">
                    <label for="bet-input">Bet Per Line (₹):</label>
                    <input type="number" id="bet-input" min="1">
                </div>
            </div>

            <div class="slot-machine">
                <div class="grid" id="slot-grid">
                    <div class="slot-item">❓</div>
                    <div class="slot-item">❓</div>
                    <div class="slot-item">❓</div>
                    <div class="slot-item">❓</div>
                    <div class="slot-item">❓</div>
                    <div class="slot-item">❓</div>
                    <div class="slot-item">❓</div>
                    <div class="slot-item">❓</div>
                    <div class="slot-item">❓</div>
                </div>
            </div>

            <button id="spin-btn">SPIN!</button>
            <h2 id="result-msg">Place a bet and spin!</h2>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
